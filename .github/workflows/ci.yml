name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal --target wasm32-unknown-unknown
          rustup default stable

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Apply ESLint fixes
        run: npm run lint:fix

      - name: Collect ESLint autofix diff
        id: lint_fix_diff
        run: |
          if ! git diff --quiet; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<EOF"
              git --no-pager diff --name-only
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment PR with lint fix instructions
        if: github.event_name == 'pull_request' && steps.lint_fix_diff.outputs.has_changes == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          LINT_FIX_FILES: ${{ steps.lint_fix_diff.outputs.files }}
        with:
          script: |
            try {
              const marker = '<!-- lint-fix-reminder -->';
              const files = (process.env.LINT_FIX_FILES || '').trim();
              const bodyLines = [
                marker,
                'ESLint found autofixable problems.',
                '',
                'Run this locally and push the result:',
                '```bash',
                'npm run lint:fix',
                '```',
                '',
                'Then commit and push updated files.',
              ];

              if (files) {
                bodyLines.push(
                  '',
                  'Files with autofix changes:',
                  '```',
                  files,
                  '```'
                );
              }

              const body = bodyLines.join('\n');

              const { owner, repo } = context.repo;
              const issue_number = context.payload.pull_request.number;
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find((comment) =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              if (error?.status === 403) {
                core.warning(
                  'Cannot post PR comment: GITHUB_TOKEN has no write access in this context.'
                );
              } else {
                throw error;
              }
            }

      - name: Fail if ESLint autofixes are not committed
        if: steps.lint_fix_diff.outputs.has_changes == 'true'
        run: |
          echo "ESLint produced autofixes."
          echo "Run 'npm run lint:fix' locally, commit the changes, and push again."
          echo "Changed files:"
          git --no-pager diff --name-only
          exit 1

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build WASM nesting package
        run: npm run wasm:build

      - name: Smoke test WASM nesting package
        run: |
          node --input-type=module <<'EOF'
          import init, { run_nesting } from './src/lib/nesting/solver/rust-wasm/pkg/nesting_wasm.js';

          await init();

          const rectangle = (id, width, height) => ({
            id,
            shape: {
              contours: [[
                { x: 0, y: 0 },
                { x: width, y: 0 },
                { x: width, y: height },
                { x: 0, y: height }
              ]],
              bounds: {
                minX: 0,
                minY: 0,
                maxX: width,
                maxY: height,
                width,
                height
              },
              area: width * height
            }
          });

          const input = {
            target: {
              contours: [[
                { x: 0, y: 0 },
                { x: 100, y: 0 },
                { x: 100, y: 80 },
                { x: 0, y: 80 }
              ]],
              bounds: {
                minX: 0,
                minY: 0,
                maxX: 100,
                maxY: 80,
                width: 100,
                height: 80
              },
              area: 8000
            },
            parts: [rectangle('part-a', 30, 20)],
            options: {
              gap: 0,
              rotations: [0]
            }
          };

          const output = JSON.parse(run_nesting(JSON.stringify(input)));

          if (!Array.isArray(output.placements) || output.placements.length !== 1) {
            throw new Error(`Expected one placement, got ${JSON.stringify(output)}`);
          }
          EOF

      - name: Upload WASM nesting package
        uses: actions/upload-artifact@v4
        with:
          name: nesting-wasm-pkg
          path: src/lib/nesting/solver/rust-wasm/pkg
          if-no-files-found: error

      - name: Build
        run: npm run build
